name: CI - Data Generator

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest --tb=short -q
        env:
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/app"

  validate:
    name: Validate Data
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ThaqalaynData
          path: ThaqalaynData
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run data validation
        run: python app/validate_data.py --data-dir ThaqalaynData --limit 500
        env:
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/app"
